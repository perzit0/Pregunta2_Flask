<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resultado - Clasificador MRI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb4d);
            background-size: 200% 200%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            width: 550px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #1a2a6c;
            margin-bottom: 20px;
        }
        .resultado-box {
            margin: 30px 0;
            padding: 30px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.8;
        }
        .normal {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .tumor {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .error {
            background: linear-gradient(135deg, #fff3cd, #ffeeba);
            color: #856404;
            border: 1px solid #ffeeba;
        }
        .btn-otra {
            background: linear-gradient(135deg, #1a2a6c, #2a3a7c);
            color: white;
            border: none;
            padding: 12px 25px;
            margin: 10px 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn-principal {
            background: linear-gradient(135deg, #28a745, #218838);
            color: white;
            border: none;
            padding: 12px 25px;
            margin: 10px 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn-otra:hover, .btn-principal:hover {
            transform: translateY(-2px);
        }
        .confianza {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.8;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏥</div>
        <h1>Resultado del Analisis</h1>
        
        <div class="resultado-box {{ clase_css }}">
            {{ resultado }}
        </div>
        
        <button class="btn-otra" onclick="window.location.href='/clasificar'">Analizar otra imagen</button>
        <button class="btn-principal" onclick="window.location.href='/principal'">Ir a Principal</button>
    </div>
</body>
</html>
